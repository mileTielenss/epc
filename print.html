<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPC PDF</title>
</head>
<body>
<p style="font-family:sans-serif;color:#555;padding:20px">PDF laden&#8230;</p>
<script>
(function () {
  function fout() {
    document.body.innerHTML = '<p style="font-family:sans-serif;color:#555;padding:20px">Geen PDF klaargezet. Open de one-pager via de app (Afronden).</p>';
  }
  try {
    var q = indexedDB.open('epc-db');
    q.onerror = fout;
    q.onsuccess = function () {
      try {
        var t = q.result.transaction('instellingen', 'readonly').objectStore('instellingen').get('printHtml');
        t.onsuccess = function () {
          if (!t.result) { fout(); return; }
          document.open();
          document.write(t.result);
          document.close();
        };
        t.onerror = fout;
      } catch (e) { fout(); }
    };
  } catch (e) { fout(); }
})();
</script>
</body>
</html>
