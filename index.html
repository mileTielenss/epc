<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>EPC Plaatsbezoek</title>
<meta name="theme-color" content="#0a6b3d">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EPC">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="topbar">
  <button type="button" id="btn-terug" hidden>&#8249; Woningen</button>
  <h1 id="titel">EPC Plaatsbezoek</h1>
  <span id="savestamp"></span>
</header>

<!-- ======================= WONINGENLIJST ======================= -->
<section id="view-lijst">
  <h2>Woningen</h2>
  <ul id="woninglijst" class="lijst"></ul>
  <button type="button" class="btn big" id="btn-nieuwewoning">+ Nieuwe woning</button>
  <button type="button" class="btn sec big" id="btn-exportalles">&#11015; Exporteer alle woningen</button>
  <button type="button" class="btn sec big" id="btn-deelalles" hidden>&#128228; Bewaar alles in Bestanden</button>
  <button type="button" class="btn sec big" id="btn-importeer">&#11014; Importeer JSON</button>
  <button type="button" class="btn sec big" id="btn-importmap" hidden>&#128194; Importeer map</button>
  <button type="button" class="btn sec big" id="btn-backupmap" hidden>&#128193; Kies backupmap</button>
  <div id="backupstatus"></div>
</section>

<main id="app" hidden>

<!-- ======================= TAB 1: ALGEMEEN ======================= -->
<section class="tab active" id="tab-algemeen">
  <div class="fld">
    <span class="lbl">Adres</span>
    <div class="invulrij">
      <input type="text" id="adres" autocomplete="street-address" placeholder="Straat nr, gemeente">
      <button type="button" class="btn addmini" id="btn-locatie" title="Huidige locatie gebruiken">&#128205;</button>
    </div>
  </div>

  <label class="fld">
    <span class="lbl">Datum plaatsbezoek</span>
    <input type="date" id="datum">
  </label>

  <div class="fld">
    <span class="lbl">Type gebouw</span>
    <div class="seg" id="seg-gebouwtype">
      <button type="button" data-v="open">Open</button>
      <button type="button" data-v="halfopen">Halfopen</button>
      <button type="button" data-v="gesloten">Gesloten</button>
      <button type="button" data-v="appartement">Appartement</button>
    </div>
  </div>

  <label class="fld">
    <span class="lbl">Bouwjaar</span>
    <input type="number" id="bouwjaar" inputmode="numeric" placeholder="bv. 1978">
  </label>

  <label class="fld">
    <span class="lbl">Notities</span>
    <textarea id="notities" rows="6" placeholder="Vrije notities over de woning..."></textarea>
  </label>
</section>

<!-- ======================= TAB 2: RAMEN & DEUREN ======================= -->
<section class="tab" id="tab-ramen">
  <div class="fld">
    <span class="lbl">Element</span>
    <div class="seg" id="seg-element">
      <button type="button" data-v="raam">Raam</button>
      <button type="button" data-v="deur">Deur</button>
      <button type="button" data-v="dakraam">Dakraam</button>
      <button type="button" data-v="glasdeur">Glasdeur</button>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Gevel</span>
    <div id="kompaswrap">
      <svg id="kompas" viewBox="0 0 200 200" aria-label="Kies gevel">
        <polygon class="gevel" data-v="achter" points="4,4 196,4 138,62 62,62"/>
        <polygon class="gevel" data-v="rechts" points="196,4 196,196 138,138 138,62"/>
        <polygon class="gevel" data-v="voor"   points="4,196 62,138 138,138 196,196"/>
        <polygon class="gevel" data-v="links"  points="4,4 62,62 62,138 4,196"/>
        <g id="kompashuis">
          <rect x="70" y="88" width="60" height="42" rx="3"/>
          <polygon points="66,90 100,68 134,90"/>
        </g>
        <text data-v="achter" x="100" y="40"  text-anchor="middle">ACHTER</text>
        <text data-v="voor"   x="100" y="172" text-anchor="middle">VOOR</text>
        <text data-v="links"  x="30"  y="104" text-anchor="middle" transform="rotate(-90 30 100)">LINKS</text>
        <text data-v="rechts" x="170" y="104" text-anchor="middle" transform="rotate(90 170 100)">RECHTS</text>
      </svg>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Afmetingen (cm)</span>
    <div class="dims">
      <input type="text" id="breedte" inputmode="decimal" placeholder="breedte">
      <span class="x">&times;</span>
      <input type="text" id="hoogte" inputmode="decimal" placeholder="hoogte">
      <span class="m2live" id="m2live"></span>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Beglazing</span>
    <div class="seg" id="seg-beglazing">
      <button type="button" data-v="enkel">Enkel</button>
      <button type="button" data-v="dubbel">Dubbel</button>
      <button type="button" data-v="hr-dubbel">HR dubbel</button>
      <button type="button" data-v="drievoudig">Drievoudig</button>
      <button type="button" data-v="paneel">Vol paneel</button>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Kader</span>
    <div class="seg" id="seg-kader">
      <button type="button" data-v="pvc">PVC</button>
      <button type="button" data-v="alu">Alu</button>
      <button type="button" data-v="hout">Hout</button>
      <button type="button" data-v="alu-thermisch">Alu therm. ond.</button>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Rolluik</span>
    <div class="seg" id="seg-rolluik">
      <button type="button" data-v="nee">Nee</button>
      <button type="button" data-v="ja">Ja</button>
    </div>
  </div>

  <div class="fld fotorow">
    <button type="button" class="btn sec" id="btn-raamfoto">&#128247; Foto afstandhouder</button>
    <img id="raamfoto-thumb" class="thumb" hidden alt="foto afstandhouder">
    <button type="button" class="thumbdel" id="btn-raamfoto-del" hidden>&times;</button>
  </div>

  <button type="button" class="btn big" id="btn-voegtoe">Voeg toe</button>
  <button type="button" class="btn sec big" id="btn-herhaal">Zelfde als vorige, nieuwe afmetingen</button>

  <div id="ramen-totaal" class="totaal"></div>
  <ul id="ramenlijst" class="lijst"></ul>
</section>

<!-- ======================= TAB 3: ENERGIE ======================= -->
<section class="tab" id="tab-energie">
  <div class="fld">
    <span class="lbl">Opwekker</span>
    <div class="seg" id="seg-opwektype">
      <button type="button" data-v="gas">Gas</button>
      <button type="button" data-v="stookolie">Stookolie</button>
      <button type="button" data-v="airco">Airco</button>
      <button type="button" data-v="andere">Andere</button>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Doet (meerdere mogelijk)</span>
    <div class="chips" id="chips-opwekfunctie">
      <button type="button" data-v="radiatoren">Radiatoren</button>
      <button type="button" data-v="vloer">Vloerverwarming</button>
      <button type="button" data-v="sww">Sanitair warm water</button>
    </div>
  </div>

  <div class="fld" id="opw-kamer" hidden>
    <span class="lbl">Kamer (cm)</span>
    <div class="dims">
      <input type="text" id="kamer-b" inputmode="decimal" placeholder="breed">
      <span class="x">&times;</span>
      <input type="text" id="kamer-d" inputmode="decimal" placeholder="diep">
      <span class="x">&times;</span>
      <input type="text" id="kamer-h" inputmode="decimal" placeholder="hoog">
      <span class="m2live" id="m3live"></span>
    </div>
  </div>

  <label class="fld">
    <span class="lbl">Beschrijving</span>
    <input type="text" id="opw-beschrijving" placeholder="bv. Vaillant condenserend 2015">
  </label>

  <div class="fld fotorow">
    <button type="button" class="btn sec" id="btn-opwekfoto">&#128247; Foto kenplaat</button>
    <img id="opwekfoto-thumb" class="thumb" hidden alt="foto kenplaat">
    <button type="button" class="thumbdel" id="btn-opwekfoto-del" hidden>&times;</button>
  </div>

  <button type="button" class="btn big" id="btn-opwek-voegtoe">Voeg opwekker toe</button>
  <ul id="opweklijst" class="lijst"></ul>

  <div class="fld">
    <span class="lbl">PV-panelen</span>
    <div class="seg" id="seg-pv">
      <button type="button" data-v="nee">Nee</button>
      <button type="button" data-v="ja">Ja</button>
    </div>
  </div>

  <label class="fld" id="fld-kwp" hidden>
    <span class="lbl">Vermogen (kWp)</span>
    <input type="text" id="kwp" inputmode="decimal" placeholder="bv. 4,2">
  </label>
</section>

<!-- ======================= TAB 4: VENTILATIE ======================= -->
<section class="tab" id="tab-ventilatie">
  <div class="fld">
    <span class="lbl">Ventilatie</span>
    <div class="seg" id="seg-ventmode">
      <button type="button" data-v="geen">Geen</button>
      <button type="button" data-v="natuurlijk">Natuurlijk</button>
      <button type="button" data-v="mechanisch">Mechanisch</button>
    </div>
  </div>

  <div class="fld">
    <span class="lbl">Tik de ruimtes aan</span>
    <div class="chips" id="vent-chips">
      <button type="button" data-v="Living">Living</button>
      <button type="button" data-v="Keuken">Keuken</button>
      <button type="button" data-v="Badkamer">Badkamer</button>
      <button type="button" data-v="Slaapkamer">Slaapkamer</button>
      <button type="button" data-v="WC">WC</button>
      <button type="button" data-v="Berging">Berging</button>
    </div>
  </div>

  <ul id="ventlijst" class="lijst"></ul>
</section>

<!-- ======================= TAB 5: EXPORT ======================= -->
<section class="tab" id="tab-export">
  <button type="button" class="btn big" id="btn-print">&#128424; Print one-pager (PDF)</button>
  <button type="button" class="btn sec big" id="btn-sluiten">Woning sluiten</button>
  <button type="button" class="btn danger big" id="btn-verwijder-woning">Woning verwijderen</button>
</section>

</main>

<nav id="tabbar" hidden>
  <button type="button" class="on" data-tab="algemeen"><span class="ic">&#127968;</span>Algemeen</button>
  <button type="button" data-tab="ramen"><span class="ic">&#129695;</span>Ramen</button>
  <button type="button" data-tab="energie"><span class="ic">&#9889;</span>Energie</button>
  <button type="button" data-tab="ventilatie"><span class="ic">&#127788;&#65039;</span>Ventilatie</button>
  <button type="button" data-tab="export"><span class="ic">&#9989;</span>Afronden</button>
</nav>

<div id="toast" hidden></div>
<input type="file" id="fotoinput" accept="image/*" capture="environment" hidden>
<input type="file" id="importinput" accept=".json,application/json" multiple hidden>
<div id="printview"></div>

<script src="app.js"></script>
</body>
</html>
